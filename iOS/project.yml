name: Fuellog
options:
  bundleIdPrefix: com.shimondeitel.fuellog
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Fuellog:
    type: application
    platform: iOS
    sources:
      - path: Fuellog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.fuellog
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Fuellog/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  FuellogTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: FuellogTests
      - path: Fuellog.storekit
    dependencies:
      - target: Fuellog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.fuellog.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  FuellogUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: FuellogUITests
    dependencies:
      - target: Fuellog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.fuellog.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Fuellog:
    build:
      targets:
        Fuellog: all
        FuellogTests: [test]
        FuellogUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Fuellog.storekit
    test:
      config: Debug
      storeKitConfiguration: Fuellog.storekit
      targets:
        - FuellogTests
        - FuellogUITests
    archive:
      config: Release
